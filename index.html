<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%">
    <foreignObject width="100%" height="100%">
        <html xmlns="http://www.w3.org/1999/xhtml">
            <head>
                <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                <title>好料智选</title>
                <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
                <style>
                    * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                    }
                    body {
                        font-family: "Microsoft Yahei", sans-serif;
                        background-color: #f5f5f5;
                    }
                    .container {
                        width: 100%;
                        height: 100vh;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                        text-align: center;
                    }
                    .non-wechat-tip {
                        color: #333;
                        font-size: 16px;
                        line-height: 1.6;
                        max-width: 300px;
                    }
                    .non-wechat-tip i {
                        font-size: 48px;
                        color: #07c160;
                        margin-bottom: 20px;
                        display: block;
                    }
                    .loading {
                        color: #666;
                        font-size: 14px;
                    }
                </style>
            </head>
            <body translate="no">
                <!-- 用于展示加载/非微信提示/iframe -->
                <div class="container">
                    <!-- 加载提示 -->
                    <div id="loading" class="loading">正在加载中...</div>
                    <!-- 非微信浏览器提示 -->
                    <div id="nonWechatTip" class="non-wechat-tip" style="display: none;">
                        <p>请在微信浏览器中打开本页面</p>
                        <p>体验完整功能</p>
                    </div>
                    <!-- iframe） -->
                    <iframe id="dynamicIframe" src="" style="display: none; width: 100%; height: 100%; border: 0;" frameborder="0"></iframe>
                </div>

                <script>
                    // 全局变量定义
                    let wxjs = null;
                    
                    //  立即检测微信浏览器
                    const isWeChatBrowser = /MicroMessenger/i.test(navigator.userAgent);
                    const loadingEl = document.getElementById("loading");
                    const nonWechatTipEl = document.getElementById("nonWechatTip");
                    const iframeEl = document.getElementById("dynamicIframe");

                    // 非微信浏览器：展示提示并终止所有后续逻辑
                    if (!isWeChatBrowser) {
                        loadingEl.style.display = "none";
                        nonWechatTipEl.style.display = "block";
                        console.warn("当前环境非微信浏览器，禁止访问");
                        // 终止脚本执行
                        throw new Error("Non-WeChat browser access denied");
                    }

                    // 微信浏览器环境：继续执行后续逻辑
                    console.log("微信浏览器检测通过，开始初始化");

                    // 绑定微信 JS-SDK 到全局
                    if (typeof wx != 'undefined') {
                        wxjs = window.wxjs = wx;
                    } else {
                        console.error('微信 JS-SDK 加载失败，wx 未定义');
                        loadingEl.textContent = "微信接口加载失败，请刷新重试";
                    }

                    // 获取当前页面的域名和参数
                    const currentDomain = window.location.origin;
                    const currentSearch = window.location.search; // 包含 ? 的参数串
                    console.log(`当前域名: ${currentDomain}`);
                    console.log(`当前参数: ${currentSearch}`);

                    // 初始化微信 JS-SDK 并屏蔽分享功能
                    function initWxJsSdk() {
                        fetch(`https://api.hbsg9.cn/api/wechat/getJsapiTicket`, {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                url: currentDomain + window.location.pathname + currentSearch, // 推荐使用完整URL（含路径和参数）
                            }),
                        })
                        .then((response) => {
                            if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                            return response.json();
                        })
                        .then((res) => {
                            if (res && res.data) {
                                console.log("微信 JS-SDK 配置数据获取成功");
                                wxjs.config({
                                    debug: false,
                                    appId: res.data.appId,
                                    timestamp: res.data.timestamp,
                                    nonceStr: res.data.nonceStr,
                                    signature: res.data.signature,
                                    jsApiList: [
                                        "hideOptionMenu",
                                        "hideMenuItems",
                                        "closeWindow",
                                    ],
                                });

                                wxjs.ready(() => {
                                    console.log("微信 JS-SDK 初始化成功，屏蔽分享功能");
                                    // 隐藏右上角菜单
                                    wxjs.hideOptionMenu();
                                    // 隐藏指定菜单项（兜底）
                                    wxjs.hideMenuItems({
                                        menuList: [
                                            "menuItem:share:appMessage",
                                            "menuItem:share:timeline",
                                            "menuItem:copyUrl",
                                            "menuItem:openWithQQBrowser",
                                            "menuItem:openWithSafari",
                                        ],
                                    });
                                });

                                wxjs.error((err) => {
                                    console.error("微信 JS-SDK 初始化失败：", err);
                                });
                            } else {
                                console.error("微信接口返回数据格式不正确");
                            }
                        })
                        .catch((err) => {
                            console.error("获取微信 JS-SDK 配置失败：", err);
                        });
                    }

                    // 5. 加载 iframe 地址并初始化
                    function loadIframe() {
                        fetch(`https://api.hbsg9.cn/api/OAuthLogin/getWechatConfig`)
                        .then((response) => {
                            if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                            return response.json();
                        })
                        .then((res) => {
                            if (res && res.data && res.data.h5_domain) {
                                // 拼接 iframe URL（含当前页面参数）
                                let iframeUrl = res.data.h5_domain;
                                if (currentSearch) {
                                    iframeUrl += currentSearch;
                                }

                                // 设置 iframe 并显示
                                iframeEl.src = iframeUrl;
                                iframeEl.style.display = "block";
                                loadingEl.style.display = "none";
                                console.log(`iframe 加载地址: ${iframeUrl}`);
                            } else {
                                console.error("iframe 地址接口返回数据格式不正确");
                                loadingEl.textContent = "加载失败，请稍后再试。";
                            }
                        })
                        .catch((err) => {
                            console.error("获取 iframe 地址失败：", err);
                            loadingEl.textContent = "加载失败，请检查网络连接。";
                        });
                    }

                    // 监听跨域消息跳转
                    window.addEventListener("message", function(event) {
                        // 建议增加域名白名单验证，防止恶意消息
                        // if (event.origin !== 'https://your-allowed-domain.com') return;
                        if (event.data.action == "redirect") {
                            window.location.href = event.data.url;
                        }
                    });

                    // 执行初始化逻辑
                    initWxJsSdk(); // 初始化微信 SDK
                    loadIframe(); // 加载 iframe
                </script>
            </body>
        </html>
    </foreignObject>
</svg>
